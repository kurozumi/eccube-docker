name: eccube

# 全サービス共通のログ上限。無制限だと高トラフィックでディスクを食い潰し
# ホストごと停止するため必須（1 サービスあたり最大 10MB×5 世代）。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  ec-cube:
    logging: *default-logging
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        ECCUBE_VERSION: ${ECCUBE_VERSION:-~4.3.0}
        PHP_VERSION: ${PHP_VERSION:-8.2}
    env_file: .env
    environment:
      # .env の値を EC-CUBE / エントリポイントへ明示的に渡す
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}
      # DATABASE_URL は DB_* から組み立てる（パスワードを二重に持たせない）。
      # environment は env_file より優先されるので、.env に古い DATABASE_URL が
      # 残っていてもこの derived 値が勝つ。
      DATABASE_URL: "mysql://${DB_USER:-eccube}:${DB_PASSWORD:-eccube_pass}@db:3306/${DB_NAME:-eccube_db}?serverVersion=${DATABASE_SERVER_VERSION:-mariadb-10.6.0}&charset=utf8mb4"
      DATABASE_SERVER_VERSION: ${DATABASE_SERVER_VERSION:-mariadb-10.6.0}
      # 本番は実メールサービスの DSN を .env で設定する。未設定なら送信は破棄（null）。
      # 開発は compose.override.yaml が Mailpit 宛てに上書きする。
      MAILER_DSN: ${MAILER_DSN:-null://null}
      ECCUBE_ADMIN_ROUTE: ${ECCUBE_ADMIN_ROUTE:-admin}
      ECCUBE_LOCALE: ${ECCUBE_LOCALE:-ja}
      # LB/プロキシ背後で X-Forwarded-* を信頼する範囲（既定は空＝信頼しない）。
      # HTTPS 終端 LB を使う複数ホスト構成では LB の IP/サブネットを設定する。
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      # DB スキーマ操作の可否。単一ホストは 0（実行）。複数ホストで「app ロール」の
      # ホストは 1 にしてスキーマに触らせない（init ロール 1 台だけ 0 にする）。
      ECCUBE_SKIP_DB_INIT: ${ECCUBE_SKIP_DB_INIT:-0}
      # ECCUBE_AUTH_MAGIC はここ（environment）では渡さない。空文字を注入すると
      # Symfony Dotenv が「設定済み」とみなし、secret が空で bin/console が落ちるため。
      # 値は .env（env_file）で渡す。bin/init.sh が未設定なら自動生成する。
      DB_HOST: db
      DB_USER: ${DB_USER:-eccube}
      DB_PASSWORD: ${DB_PASSWORD:-eccube_pass}
      DB_NAME: ${DB_NAME:-eccube_db}
      # Symfony アプリキャッシュの Redis 共有（app/config/eccube/packages/cache.yaml が参照）
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # セッション保存用 Redis（Tier 2）。app/Customize/Resource/config/services.yaml が参照。
      # キャッシュ用 redis とは別インスタンス（永続化・noeviction）を既定にする。
      SESSION_REDIS_URL: ${SESSION_REDIS_URL:-redis://redis-session:6379}
      # php-fpm プールのチューニング（entrypoint が生成）。サーバー規模に合わせて調整。
      PHP_FPM_PM: ${PHP_FPM_PM:-dynamic}
      PHP_FPM_MAX_CHILDREN: ${PHP_FPM_MAX_CHILDREN:-20}
      PHP_FPM_START_SERVERS: ${PHP_FPM_START_SERVERS:-4}
      PHP_FPM_MIN_SPARE: ${PHP_FPM_MIN_SPARE:-2}
      PHP_FPM_MAX_SPARE: ${PHP_FPM_MAX_SPARE:-6}
      PHP_FPM_MAX_REQUESTS: ${PHP_FPM_MAX_REQUESTS:-500}
    volumes:
      # EC-CUBE 本体（イメージ内容）は名前付きボリュームに展開される
      - eccube_app:/var/www/html
      # ── 本体を汚さず、Git 管理する「自分のコード」だけを重ねる ──
      - ./app/Customize:/var/www/html/app/Customize:ro
      - ./app/template:/var/www/html/app/template:ro
      - ./app/DoctrineMigrations:/var/www/html/app/DoctrineMigrations:ro
      # プラグイン（開発・導入したものを Git 管理）。dev は override が rw で上書き
      - ./app/Plugin:/var/www/html/app/Plugin:ro
      # 独自の CSS/JS。本体が default_frame.twig で customize.css / customize.js を
      # 自動読込する公式フック。asset(...,'user_data') → /html/user_data で配信
      - ./html/user_data:/var/www/html/html/user_data:ro
      # アップロード画像（商品画像等）は専用ボリュームに分離する。理由:
      #   1) 本体イメージ再ビルド・コンテナ再作成でも消えない（app と分離）
      #   2) このボリュームを NFS/EFS ドライバに差し替えれば複数ホストで共有でき、
      #      その場合データは外部サーバー側なので down -v でも失われない
      #   ※ ローカルボリュームのままだと down -v（reset/switch-version が使う）で消える。
      #     事前バックアップ方法は README「アップロード画像の共有ストレージ」を参照。
      - eccube_upload:/var/www/html/html/upload
      # framework 級設定（monolog 等）はステージングへ置き、entrypoint が本体へマージ
      - ./app/config/eccube/packages:/opt/eccube-config/packages:ro
      # ユニットテスト設定（app/Customize/Tests を対象。本体の phpunit.xml.dist は残す）
      - ./phpunit.xml:/var/www/html/phpunit.xml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-session:
        condition: service_healthy
    # php-fpm の死活を FastCGI ping で確認（libfcgi-bin の cgi-fcgi）。
    # start_period は entrypoint（migrate + cache:clear）の所要時間を見込む。
    healthcheck:
      test: ["CMD", "sh", "-c", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 180s
    restart: unless-stopped

  nginx:
    logging: *default-logging
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - eccube_app:/var/www/html:ro
      # 独自 CSS/JS はホスト側 bind を直接配信（named volume には無いため）
      - ./html/user_data:/var/www/html/html/user_data:ro
      # アップロード画像を配信（ec-cube と同じ専用ボリュームを読み取り専用で）
      - eccube_upload:/var/www/html/html/upload:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ec-cube:
        condition: service_healthy
    restart: unless-stopped

  db:
    logging: *default-logging
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${DB_NAME:-eccube_db}
      MYSQL_USER: ${DB_USER:-eccube}
      MYSQL_PASSWORD: ${DB_PASSWORD:-eccube_pass}
      TZ: Asia/Tokyo
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_bin
    volumes:
      - db_data:/var/lib/mysql
      # チューニング（innodb_buffer_pool_size 等）。サーバー RAM に合わせて調整する。
      - ./docker/mariadb/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-change_me_root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # 共有キャッシュ（Symfony アプリキャッシュ）。将来のセッション共有・複数ホスト化の土台。
  # cache 用途なので永続化は無効（--save "" / appendonly no）。maxmemory 到達時は LRU で破棄。
  redis:
    logging: *default-logging
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-256mb}"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
      - "--appendonly"
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # セッション保存用 Redis（Tier 2: 複数ホストでセッション共有）。キャッシュ用とは分離。
  # セッションは失うとログアウトされるため、永続化（appendonly）＋noeviction（LRU で
  # 勝手に消さない）にする。maxmemory は必須: 無制限だとボットのセッション大量生成で
  # ホストの RAM を圧迫し OOM killer が他コンテナを道連れにする。上限到達時は
  # 「新規セッションの書込エラー」で済み、既存ユーザーのカート/ログインは守られる。
  redis-session:
    logging: *default-logging
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--maxmemory"
      - "${SESSION_REDIS_MAXMEMORY:-256mb}"
      - "--maxmemory-policy"
      - "noeviction"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_session_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Mailpit は開発専用（送信メールの確認用）。dev だけで起動するため
  # compose.override.yaml に定義している。本番では使わない。

volumes:
  eccube_app:
  db_data:
  redis_session_data:
  # アップロード画像。複数ホストで共有するときは NFS/EFS ドライバに差し替える。
  # 例（NFS）:
  #   eccube_upload:
  #     driver: local
  #     driver_opts:
  #       type: nfs
  #       o: "addr=10.0.0.10,rw,nfsvers=4"
  #       device: ":/export/eccube/upload"
  eccube_upload:
