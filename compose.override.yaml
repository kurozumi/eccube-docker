x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# 開発用オーバーレイ（`docker compose up -d` で自動読み込みされる）。
# 自分のコード（Customize / template / DoctrineMigrations）を rw で live 編集できるようにし、
# 開発専用ツール（Mailpit・phpMyAdmin）を起動する。
#
# APP_ENV はここで上書きしない。既定は .env の prod。デバッグ時だけ .env を dev に。
services:
  ec-cube:
    environment:
      # 開発は Mailpit にメールを送って UI で確認する（外部送信しない）。
      # .env で MAILER_DSN を明示していればそちらが優先される。
      MAILER_DSN: ${MAILER_DSN:-smtp://mailpit:1025}
    volumes:
      # base の :ro を rw で上書き（同じ target は override が勝つ）
      - ./app/Customize:/var/www/html/app/Customize
      - ./app/template:/var/www/html/app/template
      - ./app/DoctrineMigrations:/var/www/html/app/DoctrineMigrations
      # プラグイン開発・導入は書き込みが要る（plugin:generate / composer install）
      - ./app/Plugin:/var/www/html/app/Plugin

  # 送信メールを外部に出さず受け止め、Web UI で確認する（開発専用）。
  mailpit:
    logging: *default-logging
    image: axllent/mailpit:latest
    environment:
      MP_MAX_MESSAGES: 500
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # メール確認 UI
    restart: unless-stopped

  # ── フロント CSS/JS ビルド（開発） ──
  # 独自テーマ方式: frontend/scss/customize.scss を Dart Sass で
  #   html/user_data/assets/css/customize.css へ watch ビルド。
  #   出力は本体が default_frame.twig で自動読込する（上書き Twig 不要）。
  #   本体を汚さず、ソースは frontend/、成果物は html/user_data/ で Git 管理。
  # 手動ビルドは bin/assets.sh build を参照。
  node:
    logging: *default-logging
    image: node:20-bookworm-slim
    working_dir: /work
    volumes:
      - ./frontend:/work                                  # ソース（scss / package.json）
      - ./html/user_data:/output                          # 出力先（customize.css）
      - eccube_app:/eccube:ro                             # 本体 scss を @import する load-path 用
    command: sh -lc "npm install --no-audit --no-fund && npm run watch"
    restart: unless-stopped

  # ── 本体テーマ丸ごとの純正ツールチェーン（Gulp/Webpack）──
  # html/template/default 等を作り替えるとき用。profile 指定時のみ起動。
  #   bin/assets.sh core-build   … npm ci && npm run build（一括ビルド）
  # 対象は named volume 内の本体テーマ（＝本体直編集・Git 管理外）である点に注意。
  assets-core:
    logging: *default-logging
    image: node:20-bookworm
    profiles: ["assets-core"]
    working_dir: /var/www/html
    volumes:
      - eccube_app:/var/www/html
      - ./html/user_data:/var/www/html/html/user_data
    entrypoint: ["sh", "-lc"]
    command: ["echo 'use: bin/assets.sh core-build'"]

  phpmyadmin:
    logging: *default-logging
    image: phpmyadmin:5
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-eccube}
      PMA_PASSWORD: ${DB_PASSWORD:-eccube_pass}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PMA_PORT:-8081}:80"            # DB 管理
    depends_on:
      - db
    restart: unless-stopped
