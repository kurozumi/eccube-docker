# app/Customize/Resource/config/services.yaml
# あなたのカスタマイズ用の DI 設定。EC-CUBE 本体は触らず、ここに書く。
# EC-CUBE 4 の Kernel は起動時にこのファイルを読み込む。
#
# 参考: monolog などの framework 級設定もこの Kernel::configureContainer と
# 同じ $loader で読まれるため、この services.yaml に monolog: を書いても拾われる。
# ただし責務分離のため、本テンプレートでは app/config/eccube/packages/ に置いている。
services:
  _defaults:
    autowire: true
    autoconfigure: true

  # クラス（Controller / Service など）を app/Customize 配下に追加したら、
  # 以下のコメントを外して PSR-4 で一括登録する:
  # Customize\:
  #   resource: '../../*'
  #   exclude: '../../{Entity,Resource,Tests}'

  # ── セッションを Redis に載せる（Tier 2: 複数ホスト対応の前提）──
  # 本体の SameSiteNoneCompatSessionHandler（決済リダイレクトの SameSite=None 対応）は
  # 内側の SessionHandlerInterface を decorate する設計。その内側を「ファイル」から
  # 「Redis」に差し替えることで、SameSite 対応を保ったままセッションを共有できる。
  # 単一ホストのみで運用するなら不要（ファイル＋共有ボリュームで足りる）。無効化は
  # この 3 定義をコメントアウトするだけでファイルセッションに戻る。
  #
  # セッション保存用 Redis 接続（キャッシュ用 redis とは別インスタンス＝noeviction）
  eccube.session.redis:
    class: Redis
    factory: ['Symfony\Component\Cache\Adapter\RedisAdapter', 'createConnection']
    arguments:
      - '%env(SESSION_REDIS_URL)%'

  # 生の Redis セッションハンドラ（SameSite ラッパの内側に差し込む）。
  # Symfony の RedisSessionHandler は strict インターフェース実装済みで二重ラップ不可のため、
  # strict を実装しない自前ハンドラを使う。TTL は gc_maxlifetime 準拠（既存挙動維持）。
  Customize\Session\RawRedisSessionHandler:
    arguments:
      $redis: '@eccube.session.redis'
      $prefix: 'ecses:'

  # 本体の SameSite ラッパの内側を「ファイル」から「Redis」へ差し替え（id は不変＝別名も維持）
  Eccube\Session\Storage\Handler\SameSiteNoneCompatSessionHandler:
    arguments:
      - '@Customize\Session\RawRedisSessionHandler'
