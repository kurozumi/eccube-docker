# EC-CUBE 4 の web ルートはプロジェクトルート（/var/www/html）。
# フロントコントローラは /index.php。静的物は html/ 以下に置かれる。

# バージョン情報をエラーページ/ヘッダに出さない
server_tokens off;

# gzip 圧縮（テキスト系のみ。画像等は既に圧縮済みなので対象外）
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain text/css text/xml
    application/javascript application/json application/xml
    application/rss+xml image/svg+xml font/ttf font/otf application/vnd.ms-fontobject;

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    client_max_body_size 64M;

    # Docker の内蔵 DNS。ec-cube を毎回解決し直すことで `--scale ec-cube=N`（複数
    # レプリカ）へリクエストを分散できる（内部ロードバランス）。
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ── セキュリティ: ここから下は変更しない ──
    # deny は必ず PHP location より前に置く（regex location は先勝ちのため、
    # /vendor/autoload.php のような内部 .php を fastcgi に通さないようにする）。
    # ドットファイル（.env 等）を隠す
    location ~ /\. {
        deny all;
    }
    # アプリ内部ディレクトリへの直接アクセスを禁止
    location ~ ^/(var|tests|test|vendor|app|src|bin)/ {
        deny all;
    }

    # ── 管理画面を IP で制限したい場合（任意）──
    # ECCUBE_ADMIN_ROUTE を変えている場合はパスを合わせる。オフィス/VPN の IP のみ許可:
    #
    # location ~ ^/admin {
    #     allow 203.0.113.10;      # オフィス
    #     allow 198.51.100.0/24;   # VPN レンジ
    #     deny all;
    #     try_files $uri $uri/ /index.php$is_args$args;
    # }
    #
    # 注意: LB/CDN 背後では remote_addr が LB の IP になるため、real_ip モジュールの
    # 設定（set_real_ip_from + real_ip_header X-Forwarded-For）が別途必要。

    # 静的アセットの長期キャッシュ（deny の後に置くので内部ディレクトリは対象外）。
    # ファイル名が変わらない運用なら 30日。CDN と併用すると効果が大きい。
    location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        # 変数経由の fastcgi_pass で resolver による再解決を効かせる（scale 対応）
        set $eccube_upstream ec-cube:9000;
        fastcgi_pass $eccube_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 300;
    }

    # ── 匿名の閲覧系ページを丸ごとキャッシュしたい場合（上級・既定は無効）──
    # EC-CUBE のページは CSRF トークン・カート・ログイン状態を埋め込むため、
    # フルページキャッシュは誤配信（他人のトークン/カート表示、CSRF 失敗）の危険がある。
    # 有効化するなら「ログイン Cookie・カート・POST・/admin を確実に bypass」した上で
    # TOP/商品一覧/詳細など匿名 GET に限定すること。雛形:
    #
    #   fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=ec:100m inactive=10m max_size=1g;
    #   map $http_cookie $ec_nocache { default 0; ~*(eccube|PHPSESSID) 1; }
    #   （php location 内で）
    #   set $skip $ec_nocache;
    #   if ($request_method != GET) { set $skip 1; }
    #   if ($request_uri ~* ^/(admin|mypage|cart|shopping|entry|login)) { set $skip 1; }
    #   fastcgi_cache ec;
    #   fastcgi_cache_bypass $skip;
    #   fastcgi_no_cache $skip;
    #   fastcgi_cache_valid 200 1m;
    #   add_header X-Cache $upstream_cache_status;
}
